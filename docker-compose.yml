version: '3.8'

services:
  # API Service (Backend)
  api:
    # Build the image from the Dockerfile in the './api' directory
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: korat-kpi-api
    # Use an .env file to manage environment variables for the database connection
    env_file:
      - .env
    ports:
      # Map host port 8809 to container port 8809 (as defined in ecosystem.config.js)
      - "8809:8809"
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8809/kpikorat/api/health', r => { r.on('data', () => {}); process.exit(r.statusCode === 200 ? 0 : 1); }).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Frontend Service (Angular + Nginx)
  frontend:
    # Build the image from the Dockerfile in the './frontend' directory
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: korat-kpi-frontend
    ports:
      # Map host port 8808 to container port 80 (Nginx's default)
      - "8808:80"
    networks:
      - app-network
    # Ensures the frontend starts after the API is available
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/kpikorat/"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  # Define a bridge network for services to communicate with each other
  app-network:
    driver: bridge
