version: '3.8'

services:
  # API Service (Backend)
  api:
    # Build the image from the Dockerfile in the './api' directory
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: korat-kpi-api
    # Use an .env file to manage environment variables for the database connection
    env_file:
      - .env
    ports:
      # Map host port 8809 to container port 8809 (as defined in ecosystem.config.js)
      - "8809:8809"
    networks:
      - app-network
    restart: unless-stopped

  # Frontend Service (Angular + Nginx)
  frontend:
    # Build the image from the Dockerfile in the './frontend' directory
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: korat-kpi-frontend
    ports:
      # Map host port 8808 to container port 80 (Nginx's default)
      - "8808:80"
    networks:
      - app-network
    # Ensures the frontend starts after the API is available
    depends_on:
      - api
    restart: unless-stopped

networks:
  # Define a bridge network for services to communicate with each other
  app-network:
    driver: bridge
