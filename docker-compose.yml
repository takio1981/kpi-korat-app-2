services:
  # ─── API Service (Backend) ────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: korat-kpi-api
    env_file:
      - .env
    ports:
      - "8809:8809"
    networks:
      - app-network
    restart: unless-stopped
    # Log rotation: จำกัด log ไม่เกิน 10MB × 3 ไฟล์ = max 30MB
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "node", "-e",
        "require('http').get('http://localhost:8809/kpikorat/api/health', r => { r.on('data', () => {}); process.exit(r.statusCode === 200 ? 0 : 1); }).on('error', () => process.exit(1))"]
      interval: 20s
      timeout: 8s
      retries: 5
      start_period: 30s

  # ─── Frontend Service (Angular + Nginx) ─────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: korat-kpi-frontend
    ports:
      - "8808:80"
    networks:
      - app-network
    depends_on:
      api:
        # service_started: Nginx เริ่มทันที ไม่รอ healthcheck
        # Nginx proxy retry อัตโนมัติเมื่อ API พร้อม
        condition: service_started
    restart: unless-stopped
    # Log rotation: Nginx access log จำกัด 5MB × 3 ไฟล์
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/kpikorat/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  app-network:
    driver: bridge
