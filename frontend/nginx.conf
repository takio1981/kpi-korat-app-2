# ─────────────────────────────────────────────────────────────────────────
# HTTP → HTTPS Redirect (uncomment ใน production เมื่อมี SSL cert แล้ว)
# ─────────────────────────────────────────────────────────────────────────
# server {
#     listen 80;
#     server_name your-domain.com;
#     return 301 https://$host$request_uri;
# }

# ─────────────────────────────────────────────────────────────────────────
# Main Server (เปลี่ยนเป็น listen 443 ssl ใน production)
# ─────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name localhost;

    # ─── SSL Config (uncomment ใน production) ──────────────────────────
    # listen 443 ssl http2;
    # ssl_certificate     /etc/nginx/certs/fullchain.pem;
    # ssl_certificate_key /etc/nginx/certs/privkey.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    # ssl_prefer_server_ciphers on;
    # ssl_session_cache shared:SSL:10m;
    # ssl_session_timeout 1d;
    # ssl_session_tickets off;

    root /usr/share/nginx/html;
    index index.html;

    # ─── Security Headers ────────────────────────────────────────
    # HSTS — บังคับ HTTPS 1 ปี (เปิดใช้เฉพาะเมื่อมี SSL แล้ว)
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ป้องกัน clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;
    # ป้องกัน MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;
    # ควบคุม referrer
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # ปิด sensor APIs ที่ไม่ใช้
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
    # CSP — content security policy
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com data:; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
    # XSS Protection (legacy)
    add_header X-XSS-Protection "1; mode=block" always;

    # ─── Hide server version ──────────────────────────────────
    server_tokens off;

    # ─── Gzip Compression ────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # ─── Connection Limits ───────────────────────────────────────
    # (ต้องเพิ่ม limit_conn_zone ใน nginx.conf หลัก หรือ http block)

    # Redirect หน้าแรก (Root) ให้วิ่งไปที่ /kpikorat/ อัตโนมัติ
    location = / {
        return 301 /kpikorat/;
    }

    # ─── Block access to hidden/sensitive files ──────────────
    location ~ /\.(env|git|ht) {
        deny all;
        return 404;
    }

    # ─── Static Assets (JS/CSS/images) — Cache 1 year ────────────
    location ~* ^/kpikorat/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ตั้งค่าสำหรับ Frontend ที่อยู่ใน Path /kpikorat/
    location /kpikorat/ {
        try_files $uri $uri/ /kpikorat/index.html;

        # HTML ไม่ cache เพื่อให้ได้ version ล่าสุด
        location ~* \.html$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    # ─── Reverse Proxy สำหรับ API ────────────────────────────────
    location /kpikorat/api/ {
        proxy_pass http://api:8809/kpikorat/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_send_timeout 60s;

        # Body size limit (สอดคล้องกับ multer 5MB)
        client_max_body_size 6m;

        # Hide API server header
        proxy_hide_header X-Powered-By;
    }
}
