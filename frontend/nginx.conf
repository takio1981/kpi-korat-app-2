server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Redirect หน้าแรก (Root) ให้วิ่งไปที่ /kpikorat/ อัตโนมัติ
    location = / {
        return 301 /kpikorat/;
    }

    # ตั้งค่าสำหรับ Frontend ที่อยู่ใน Path /kpikorat/
    location /kpikorat/ {
        try_files $uri $uri/ /kpikorat/index.html;
    }

    # (Optional) Reverse Proxy สำหรับ API เพื่อให้ Frontend เรียก /kpikorat/api ได้โดยไม่ต้องข้าม Port
    location /kpikorat/api/ {
        proxy_pass http://api:8809/kpikorat/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
