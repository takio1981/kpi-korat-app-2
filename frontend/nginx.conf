server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ─── Gzip Compression ────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # ─── Connection Limits ───────────────────────────────────────
    # (ต้องเพิ่ม limit_conn_zone ใน nginx.conf หลัก หรือ http block)

    # Redirect หน้าแรก (Root) ให้วิ่งไปที่ /kpikorat/ อัตโนมัติ
    location = / {
        return 301 /kpikorat/;
    }

    # ─── Static Assets (JS/CSS/images) — Cache 1 year ────────────
    location ~* ^/kpikorat/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ตั้งค่าสำหรับ Frontend ที่อยู่ใน Path /kpikorat/
    location /kpikorat/ {
        try_files $uri $uri/ /kpikorat/index.html;

        # HTML ไม่ cache เพื่อให้ได้ version ล่าสุด
        location ~* \.html$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    # ─── Reverse Proxy สำหรับ API ────────────────────────────────
    location /kpikorat/api/ {
        proxy_pass http://api:8809/kpikorat/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # Body size limit (สอดคล้องกับ multer 5MB)
        client_max_body_size 6m;
    }
}
